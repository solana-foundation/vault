name: IDL Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-idl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          install-anchor: 'true'
          install-nightly-rustfmt: 'true'
          rust-cache-key: 'idl-check'
      - name: Regenerate IDL and clients
        run: |
          just generate-idl
          just generate-clients
      - name: Typecheck the generated TypeScript client
        run: pnpm run typecheck
      - name: Check the committed IDL is up to date
        run: |
          if [ -n "$(git status --porcelain idl/)" ]; then
            echo "::error::idl/async_vault.json is out of date! Run: just generate-idl"
            git --no-pager diff idl/
            exit 1
          fi
