name: Benchmark

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  compute-units:
    name: Compute Units
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          install-anchor: 'true'
          install-nightly-rustfmt: 'true'
          rust-cache-key: 'benchmark'

      - name: Build IDL and clients
        run: |
          pnpm run generate-idl
          pnpm run generate-clients

      - name: Run benchmark
        run: CU_REPORT=1 CU_REPORT_DATE=$(date +%Y-%m-%d) cargo test -p integration-tests

      - name: Report compute units
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: solana-foundation/github-actions/cu-benchmark@f0ddc2234ac4ac19c5c17f520b60bc2d7308744f
