name: Format

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          install-nightly-rustfmt: 'true'
          install-solana: 'false'
          install-just: 'false'
          install-pnpm: 'false'
          rust-cache-key: 'format'
      - name: Check Rust formatting
        run: cargo +nightly fmt -p async_vault -p vault_common -p integration-tests -- --check
      - name: Run Clippy
        run: cargo clippy -p async_vault -p vault_common

  typescript-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          install-nightly-rustfmt: 'true'
          install-solana: 'false'
          install-just: 'false'
          rust-cache-key: 'typescript-format'
      - run: pnpm run format:check
      - run: pnpm run generate-clients
      - run: pnpm lint
      - run: pnpm --filter @vault-suite/demo lint
      - run: pnpm --filter @vault-suite/demo build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
