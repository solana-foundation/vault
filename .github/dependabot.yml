version: 2

multi-ecosystem-groups:
  all-deps:
    schedule:
      interval: cron
      cronjob: '0 9 1,15 * *'

updates:
  - package-ecosystem: cargo
    directory: '/'
    multi-ecosystem-group: all-deps
    patterns: ['*']
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    allow:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch

  - package-ecosystem: npm
    directory: '/'
    multi-ecosystem-group: all-deps
    patterns: ['*']
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    allow:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch

  - package-ecosystem: github-actions
    directory: '/'
    multi-ecosystem-group: all-deps
    patterns: ['*']
    cooldown:
      default-days: 7
    allow:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
