version: 2
updates:
  - package-ecosystem: cargo
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
    groups:
      cargo-non-major:
        applies-to: version-updates
        update-types:
          - minor

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
    groups:
      npm-non-major:
        applies-to: version-updates
        update-types:
          - minor

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-patch
    groups:
      actions:
        patterns:
          - '*'
